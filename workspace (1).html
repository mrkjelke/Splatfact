<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticos Workspace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d0f12;--surface:#161a1f;--surface2:#1e2329;--surface3:#252b33;--border:#2a3040;--border2:#3a4455;--coral:#d97757;--coralh:#c96a47;--tan:#c9a882;--blue:#4a90d9;--sage:#7aaa8a;--purple:#9b7fd4;--pink:#d4679b;--amber:#e0a030;--teal:#3dbfa0;--text:#e8eaf0;--text2:#9aa3b0;--text3:#5c6572;--aglow:rgba(217,119,87,0.14);--font:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:ui-monospace,"SF Mono","Cascadia Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
.sidebar{width:224px;min-width:224px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sb-logo{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-img{width:32px;height:32px;border-radius:50%;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.sb-logo-img svg{width:24px;height:24px}
.sb-logo-text{font-size:15px;font-weight:600;color:var(--text)}
.sb-logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}
.sb-sec{font-size:9.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--text3);padding:12px 18px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-left:2px solid transparent;transition:all .14s;position:relative}
.sb-item:hover{background:var(--surface2);color:var(--text);border-left-color:var(--border2)}
.sb-item.active{background:var(--aglow);color:var(--coral);border-left-color:var(--coral)}
.sb-item-acts{display:flex;gap:2px;margin-left:auto;opacity:0;transition:opacity .12s}
.sb-item:hover .sb-item-acts{opacity:1}
.ia-btn{width:20px;height:20px;border-radius:4px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);transition:all .12s}
.ia-btn:hover{background:var(--surface3);color:var(--text)}
.ia-btn.del:hover{background:rgba(200,60,60,.2);color:#e05555}
.sb-add{margin:10px 16px 0;border:1px dashed var(--border2);border-radius:7px;padding:7px;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;transition:all .14s;background:none;width:calc(100% - 32px);font-family:var(--font)}
.sb-add:hover{border-color:var(--coral);color:var(--coral)}
.main{margin-left:224px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.tb-title{font-size:15px;font-weight:600;color:var(--text);flex:1;display:flex;align-items:center;gap:8px}
.tb-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .14s;font-family:var(--font)}
.btn-coral{background:var(--coral);color:#fff}.btn-coral:hover{background:var(--coralh)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.sw{position:relative}.sw input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px 6px 28px;font-size:12.5px;color:var(--text);width:180px;outline:none;font-family:var(--font)}
.sw::before{content:"⌕";position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.save-dot{width:7px;height:7px;border-radius:50%;background:var(--sage);flex-shrink:0;transition:all .3s}
.save-dot.saving{background:var(--amber);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.add-drop{position:relative}
.add-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border2);border-radius:9px;overflow:hidden;display:none;min-width:148px;box-shadow:0 8px 24px rgba(0,0,0,.45);z-index:200}
.add-menu.open{display:block}
.add-mi{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text2);transition:background .12s}
.add-mi:hover{background:var(--surface2);color:var(--text)}
.add-mi-ic{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center}
.content{padding:20px 22px;flex:1}
.agrid{display:grid;grid-template-columns:1fr 1fr 300px;gap:16px;align-items:start}
.col-main{grid-column:span 2;display:flex;flex-direction:column;gap:14px}
.col-notes{display:flex;flex-direction:column;gap:11px}
.feat-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.feat-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.feat-hdr-t{font-size:12px;font-weight:600;color:var(--text);flex:1}
.feat-hdr-m{font-size:10px;color:var(--text3);font-family:var(--mono)}
.feat-body{padding:14px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;min-height:84px}
.feat-empty{padding:14px 16px;font-size:12px;color:var(--text3)}
.fi{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;position:relative;padding:6px;border-radius:9px;transition:background .13s}
.fi:hover{background:var(--surface2)}
.fi-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.06);transition:transform .14s,box-shadow .14s}
.fi-wrap svg{width:26px;height:26px}
.fi:hover .fi-wrap{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.4)}
.fi-lbl{font-size:10px;color:var(--text3);max-width:58px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.fi:hover .fi-lbl{color:var(--text2)}
.fi-acts{position:absolute;top:-3px;right:-3px;display:none;gap:2px;background:var(--surface);border-radius:5px;padding:2px}
.fi:hover .fi-acts{display:flex}
.feat-add{width:48px;height:48px;border-radius:12px;border:1px dashed var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:20px;transition:all .13s;align-self:flex-start;margin-top:6px}
.feat-add:hover{border-color:var(--coral);color:var(--coral)}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.sec-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-hicon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-hicon svg{width:15px;height:15px}
.sec-htitle{font-size:12.5px;font-weight:600;color:var(--text);flex:1}
.sec-hcount{font-size:10px;color:var(--text3);font-family:var(--mono);background:var(--surface2);padding:2px 7px;border-radius:20px}
.sec-hbtns{display:flex;gap:3px}
.shb{width:23px;height:23px;border-radius:5px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .13s}
.shb:hover{background:var(--surface2);color:var(--text)}.shb.on{background:var(--surface3);color:var(--coral)}
.shb.del:hover{background:rgba(200,60,60,.2);color:#e05555}.shb.edit:hover{background:rgba(74,144,217,.15);color:var(--blue)}
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:2px;padding:8px}
.ig-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 5px;border-radius:8px;cursor:pointer;transition:background .13s;position:relative}
.ig-item:hover{background:var(--surface2)}
.ig-wrap{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.05);transition:transform .14s,box-shadow .14s}
.ig-wrap svg{width:22px;height:22px}
.ig-item:hover .ig-wrap{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.38)}
.ig-label{font-size:10px;color:var(--text3);text-align:center;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ig-item:hover .ig-label{color:var(--text2)}
.ig-acts{position:absolute;top:1px;right:1px;display:none;gap:2px;background:var(--surface);border-radius:4px;padding:2px}
.ig-item:hover .ig-acts{display:flex}
.link-list{padding:3px 0}
.ll-item{display:flex;align-items:center;gap:9px;padding:8px 13px;cursor:pointer;transition:background .12s;position:relative}
.ll-item:hover{background:var(--surface2)}
.ll-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ll-icon svg{width:14px;height:14px}
.ll-title{font-size:12.5px;color:var(--text2);flex:1;transition:color .12s}
.ll-item:hover .ll-title{color:var(--text)}
.ll-badge{font-size:10px;padding:2px 6px;border-radius:20px;background:rgba(74,144,217,.12);color:var(--blue);font-weight:500}
.ll-acts{display:none;gap:2px;margin-left:4px}
.ll-item:hover .ll-acts{display:flex}
.act-btn{width:20px;height:20px;border-radius:4px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;background:rgba(255,255,255,.06);color:var(--text2);transition:all .12s;flex-shrink:0}
.act-btn:hover{background:rgba(255,255,255,.12)}.act-btn.del:hover{background:rgba(200,60,60,.2);color:#e05555}.act-btn.edit:hover{background:rgba(74,144,217,.15);color:var(--blue)}
.sec-footer{padding:8px 13px;border-top:1px solid var(--border)}
.sec-add{font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;display:inline-flex;align-items:center;gap:4px;transition:color .12s;padding:0;font-family:var(--font)}
.sec-add:hover{color:var(--coral)}
.empty-msg{padding:18px;text-align:center;color:var(--text3);font-size:12px}
.notes-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.notes-lbl{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3)}
.sticky{border-radius:10px;padding:12px 13px;position:relative;transition:transform .15s}
.sticky:hover{transform:translateY(-1px)}
.sk-y{background:#1e1904;border:1px solid #3a2f0a}.sk-b{background:#071219;border:1px solid #112540}
.sk-g{background:#061509;border:1px solid #0c2f14}.sk-p{background:#10091c;border:1px solid #221040}.sk-r{background:#1c0707;border:1px solid #3a0e0e}
.sk-hdr{display:flex;align-items:flex-start;gap:6px;margin-bottom:8px}
.sk-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;flex:1;padding-top:1px}
.sk-y .sk-tag{color:#b88a08}.sk-b .sk-tag{color:var(--blue)}.sk-g .sk-tag{color:var(--sage)}.sk-p .sk-tag{color:var(--purple)}.sk-r .sk-tag{color:#cc5555}
.sk-acts{display:flex;gap:2px;opacity:0;transition:opacity .13s}.sticky:hover .sk-acts{opacity:1}
.sk-body{font-size:12.5px;color:var(--text2);line-height:1.55;margin-bottom:7px}
.cl{display:flex;flex-direction:column;gap:4px;margin-bottom:6px}
.ci{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.ci input[type=checkbox]{appearance:none;width:13px;height:13px;border-radius:3px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;position:relative;flex-shrink:0;transition:all .12s}
.ci input[type=checkbox]:checked{background:var(--sage);border-color:var(--sage)}
.ci input[type=checkbox]:checked::after{content:"✓";position:absolute;top:-2px;left:1px;font-size:10px;color:#06150a;font-weight:700}
.ci label{cursor:pointer;flex:1;line-height:1.4}.ci input[type=checkbox]:checked ~ label{text-decoration:line-through;color:var(--text3)}
.ci-del{width:16px;height:16px;border-radius:3px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;flex-shrink:0;transition:color .12s}
.ci:hover .ci-del{opacity:1}.ci-del:hover{color:#e05555}
.ci-add{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 0;display:inline-flex;align-items:center;gap:3px;transition:color .12s;font-family:var(--font)}
.ci-add:hover{color:var(--sage)}
.sk-prog{height:2px;background:var(--border);border-radius:10px;margin:7px 0 4px;overflow:hidden}
.sk-meta{display:flex;justify-content:space-between;margin-top:6px}
.sk-date,.sk-pct{font-size:9.5px;color:var(--text3);font-family:var(--mono)}
.add-note-btn{border:1px dashed var(--border2);border-radius:9px;padding:9px;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;transition:all .14s;background:none;width:100%;font-family:var(--font)}
.add-note-btn:hover{border-color:var(--tan);color:var(--tan)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.mo.open{display:flex}
.mo-box{background:var(--surface);border:1px solid var(--border2);border-radius:13px;padding:22px;width:450px;max-width:95vw;max-height:90vh;overflow-y:auto}
.mo-box h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
.mo-box label{font-size:11.5px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.mo-inp{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--text);margin-bottom:12px;font-family:var(--font);outline:none;transition:border-color .14s}
.mo-inp:focus{border-color:var(--coral)}
.mo-ta{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--text);margin-bottom:12px;font-family:var(--font);outline:none;resize:vertical;min-height:72px;transition:border-color .14s}
.mo-ta:focus{border-color:var(--coral)}
.mo-sel{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--text);margin-bottom:12px;font-family:var(--font);outline:none;cursor:pointer}
.mo-sel option{background:var(--surface2)}
.mo-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mo-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.ipw{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px;max-height:210px;overflow-y:auto;margin-bottom:12px}
.ip-search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text);margin-bottom:7px;font-family:var(--font);outline:none}
.ipgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ipick{width:34px;height:34px;border-radius:7px;border:1px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;background:transparent;padding:0}
.ipick:hover{background:var(--surface3);border-color:var(--border2)}.ipick.sel{background:var(--aglow);border-color:var(--coral)}
.ipick-in{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center}.ipick-in svg{width:16px;height:16px}
.mo-cl-item{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.mo-cl-item input[type=checkbox]{flex-shrink:0;width:13px;height:13px;cursor:pointer}
.mo-cl-txt{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:12px;color:var(--text);outline:none;font-family:var(--font)}
.mo-cl-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;width:18px;height:18px}
.mo-cl-del:hover{color:#e05555}
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:9px 15px;font-size:13px;color:var(--text);z-index:999;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ── SIDEBAR COLLAPSE ────────────────────────────────── */
.sidebar{transition:width .22s cubic-bezier(.4,0,.2,1)}
.sidebar.collapsed{width:56px;min-width:56px}
.sidebar.collapsed .sb-logo-text,
.sidebar.collapsed .sb-logo-sub,
.sidebar.collapsed .sb-sec,
.sidebar.collapsed .sb-item span,
.sidebar.collapsed .sb-item-acts,
.sidebar.collapsed .sb-add{display:none}
.sidebar.collapsed .sb-item{padding:7px 0;justify-content:center}
.sidebar.collapsed .sb-logo{padding:12px 0;justify-content:center}
.sidebar.collapsed .sb-logo-img{margin:0}
.main{transition:margin-left .22s cubic-bezier(.4,0,.2,1)}
.main.expanded{margin-left:56px}
.sb-toggle{width:28px;height:28px;border-radius:7px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .14s;flex-shrink:0;margin-left:auto}
.sb-toggle:hover{background:var(--surface2);color:var(--text)}
.sidebar.collapsed .sb-toggle{margin:0 auto}
.sb-item[title]{position:relative}
.sidebar.collapsed .sb-item:hover::after{content:attr(data-label);position:absolute;left:58px;top:50%;transform:translateY(-50%);background:var(--surface3);color:var(--text);padding:4px 10px;border-radius:6px;font-size:12px;white-space:nowrap;z-index:200;border:1px solid var(--border2);pointer-events:none}

.ci-inline{display:flex;align-items:center;gap:7px;margin-top:6px;padding-top:5px;border-top:1px solid rgba(255,255,255,.05)}
.ci-inline input[type=checkbox]{opacity:.3;flex-shrink:0;width:13px;height:13px;pointer-events:none}
.ci-inline-txt{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border2);outline:none;font-size:12px;color:var(--text2);padding:2px 0;font-family:var(--font);transition:border-color .14s}
.ci-inline-txt:focus{border-bottom-color:var(--sage);color:var(--text)}
.ci-inline-txt::placeholder{color:var(--text3)}
.ci-inline-add{width:20px;height:20px;border-radius:5px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;padding:0;transition:all .13s}
.ci-inline-add:hover{background:rgba(122,170,138,.18);color:var(--sage)}

.conf-mo{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.conf-mo.open{display:flex}
.conf-box{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:22px 24px;width:320px;max-width:92vw;box-shadow:0 16px 48px rgba(0,0,0,.55)}
.conf-msg{font-size:13.5px;color:var(--text);line-height:1.6;margin-bottom:18px}
.conf-acts{display:flex;gap:8px;justify-content:flex-end}
.btn-del{background:#b83030;color:#fff;border:none}
.btn-del:hover{background:#962626}

.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:36px 40px;width:380px;max-width:94vw;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-logo-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center}
.login-title{font-size:20px;font-weight:700;color:var(--text)}
.login-sub{font-size:12px;color:var(--text3);margin-top:2px}
.login-field{margin-bottom:14px}
.login-field label{font-size:11.5px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.login-field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13.5px;color:var(--text);outline:none;font-family:var(--font);transition:border-color .14s}
.login-field input:focus{border-color:var(--coral)}
.login-err{font-size:12px;color:#e05555;margin-bottom:12px;min-height:16px}
.login-btn{width:100%;padding:10px;border-radius:8px;background:var(--coral);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background .14s;margin-top:4px}
.login-btn:hover{background:var(--coralh)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.admin-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:6px 18px;display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--text3)}
.admin-bar a{color:var(--coral);cursor:pointer;text-decoration:none}
.admin-bar a:hover{text-decoration:underline}

.admin-screen.open{display:flex}
.admin-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px}
.admin-hdr h2{font-size:16px;font-weight:600;flex:1}
.admin-content{padding:24px;flex:1;overflow-y:auto}
.user-table{width:100%;border-collapse:collapse;font-size:13px}
.user-table th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border2);color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.8px}
.user-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.user-table tr:hover td{background:var(--surface2)}
.admin-add{display:flex;gap:8px;margin-bottom:20px}
.admin-add input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--text);outline:none;font-family:var(--font)}
.admin-add input:focus{border-color:var(--coral)}

const SK = 'ws_v5';
function loadData() {
  try { const r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch(e) {}
  return JSON.parse(JSON.stringify(DEF));
}
function save() {
  const dot = document.getElementById('sdot');
  dot.classList.add('saving');
  clearTimeout(save._t);
  save._t = setTimeout(function() {
    try { localStorage.setItem(SK, JSON.stringify({cur: cur, areas: areas})); } catch(e) { toast('Storage error'); }
    dot.classList.remove('saving');
  }, 600);
}

function toast(m) {
  const t = document.getElementById('toast');

}

// ── NOTES ─────────────────────────────────────────────────────────────────
function renderNote(n) {
  var tot = n.cl.length;
  var dn = n.cl.filter(function(c) { return c.done; }).length;
  var pct = tot ? Math.round(dn / tot * 100) : 0;
  var nid = n.id;
  var clHTML = '';
  if (tot > 0) {
    n.cl.forEach(function(c) {
      clHTML += '<div class="ci">'
        + '<input type="checkbox" id="ci-' + c.id + '"' + (c.done ? ' checked' : '') + ' onchange="togCI(\'' + nid + '\',\'' + c.id + '\',this.checked)">'
        + '<label for="ci-' + c.id + '">' + c.t + '</label>'
        + '<button class="ci-del" onclick="delCI(\'' + nid + '\',\'' + c.id + '\')" title="Slett"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>'
        + '</div>';
    });
    clHTML = '<div class="cl">' + clHTML + '</div>'
      + '<div class="sk-prog"><div class="sk-pf" id="spf-' + nid + '" style="height:100%;border-radius:10px;background:var(--sage);transition:width .3s;width:' + pct + '%"></div></div>'
      + '<div class="sk-meta"><span class="sk-date">' + n.date + '</span><span class="sk-pct" id="spl-' + nid + '">' + dn + '/' + tot + '</span></div>';
  } else {
    clHTML = '<div class="sk-meta"><span class="sk-date">' + n.date + '</span></div>';
  }
  return '<div class="sticky sk-' + n.c + '" id="sk-' + nid + '">'
    + '<div class="sk-hdr"><span class="sk-tag">' + n.tag + '</span>'

function togCI(nid, cid, done) {

  const s = area.secs.find(function(x) { return x.id === sid; });
  if (!s) { toast('Add a section first'); closeMo(); return; }
  s.links.push({id:'l'+Date.now(), t:t, i:MC.icon||'link2', u:normURL(gv('m-u')), b:gv('m-b')});
  closeMo(); render(); save();

// ── SUPABASE ───────────────────────────────────────────────────────────────
var SUPABASE_URL = 'https://wbukktjvayjfdmkdkqxa.supabase.co';
var SUPABASE_KEY = 'SUPABASE_ANON_KEY_HERE';
var _sb = null;
var _user = null;
var _profile = null;

function getSB() {
  if (!_sb) _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return _sb;
}

async function doLogin() {
  var email = document.getElementById('li-email').value.trim();
  var pass  = document.getElementById('li-pass').value;
  var err   = document.getElementById('li-err');
  var btn   = document.getElementById('li-btn');
  if (!email || !pass) { err.textContent = 'Fyll inn e-post og passord.'; return; }
  btn.disabled = true; btn.textContent = 'Logger inn…'; err.textContent = '';
  var sb = getSB();
  var res = await sb.auth.signInWithPassword({ email: email, password: pass });
  if (res.error) {
    err.textContent = 'Feil e-post eller passord.';
    btn.disabled = false; btn.textContent = 'Logg inn';
    return;
  }
  _user = res.data.user;
  await loadProfile();
  onLoggedIn();
}

async function loadProfile() {
  var sb = getSB();
  var res = await sb.from('profiles').select('*').eq('id', _user.id).single();
  if (res.data) {
    _profile = res.data;
  } else {
    // First login — create profile
    var ins = await sb.from('profiles').insert({
      id: _user.id,
      email: _user.email,
      display_name: _user.email.split('@')[0],
      is_admin: false
    });
    _profile = { id: _user.id, email: _user.email, is_admin: false };
  }
}

async function loadWorkspace() {
  var sb = getSB();
  var res = await sb.from('workspaces').select('data').eq('user_id', _user.id).single();
  if (res.data && res.data.data && Object.keys(res.data.data).length > 0) {
    var d = res.data.data;
    cur = d.cur || 'iv';
    Object.keys(areas).forEach(function(k) { delete areas[k]; });
    Object.assign(areas, d.areas || {});
  }
}

async function saveToSupabase() {
  if (!_user) return;
  var sb = getSB();
  var payload = { cur: cur, areas: areas };
  await sb.from('workspaces').upsert({
    user_id: _user.id,
    data: payload,
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id' });
}

function onLoggedIn() {
  document.getElementById('login-screen').style.display = 'none';
  loadWorkspace().then(function() {
    renderSB(); render(); initDadJokes();
    addAdminBar();
  });
}

function addAdminBar() {
  var bar = document.createElement('div');
  bar.className = 'admin-bar';
  bar.innerHTML = 'Innlogget som <strong style="color:var(--text2);margin:0 4px">' + (_profile.email) + '</strong>'
    + (_profile.is_admin ? ' · <a onclick="openAdmin()">Admin</a>' : '')
    + ' · <a onclick="doLogout()">Logg ut</a>';
  document.querySelector('.main').prepend(bar);
}

async function doLogout() {
  var sb = getSB();
  await sb.auth.signOut();
  location.reload();
}

// ── ADMIN ──────────────────────────────────────────────────────────────────
async function openAdmin() {
  document.getElementById('admin-screen').classList.add('open');
  await loadAdminUsers();
}

function closeAdmin() {
  document.getElementById('admin-screen').classList.remove('open');
}

async function loadAdminUsers() {
  var sb = getSB();
  var res = await sb.from('profiles').select('*').order('created_at', { ascending: true });
  var tbody = document.getElementById('adm-users');
  tbody.innerHTML = '';
  (res.data || []).forEach(function(u) {
    var tr = document.createElement('tr');
    var date = new Date(u.created_at).toLocaleDateString('nb-NO');
    tr.innerHTML = '<td>' + u.email + '</td>'
      + '<td>' + (u.display_name || '—') + '</td>'
      + '<td>' + (u.is_admin ? '✓' : '') + '</td>'
      + '<td style="font-family:var(--mono);font-size:11px">' + date + '</td>'
      + '<td><button class="btn btn-ghost" style="font-size:11px;padding:3px 8px" onclick="adminDelUser(\'' + u.id + '\',\'' + u.email + '\')">Slett</button></td>';
    tbody.appendChild(tr);
  });
}

async function adminAddUser() {
  var email = document.getElementById('adm-email').value.trim();
  var pass  = document.getElementById('adm-pass').value;
  var msg   = document.getElementById('adm-msg');
  if (!email || !pass) { msg.style.color='#e05555'; msg.textContent = 'Fyll inn e-post og passord.'; return; }
  var sb = getSB();
  // Use admin API via service role - for now use signUp and handle profile creation
  var res = await sb.auth.signUp({ email: email, password: pass });
  if (res.error) { msg.style.color='#e05555'; msg.textContent = res.error.message; return; }
  // Insert profile
  await sb.from('profiles').insert({
    id: res.data.user.id,
    email: email,
    display_name: email.split('@')[0],
    is_admin: false
  });
  msg.style.color = 'var(--sage)';
  msg.textContent = 'Bruker opprettet: ' + email;
  document.getElementById('adm-email').value = '';
  document.getElementById('adm-pass').value = '';
  await loadAdminUsers();
}

async function adminDelUser(uid, email) {
  showConfirm('Slette brukeren ' + email + '?', 'Slett', async function() {
    var sb = getSB();
    await sb.from('profiles').delete().eq('id', uid);
    document.getElementById('adm-msg').textContent = 'Bruker slettet.';
    await loadAdminUsers();
  });
}

// ── OVERRIDE save() to use Supabase when logged in ────────────────────────
var _origSave = save;
save = function() {
  if (_user) {
    saveToSupabase();
  } else {
    _origSave();
  }
};

// ── INIT: check existing session ──────────────────────────────────────────
getSB().auth.getSession().then(async function(res) {
  if (res.data && res.data.session) {
    _user = res.data.session.user;
    await loadProfile();
    onLoggedIn();
  }
  // else: login screen stays visible
});

// ── INIT ──────────────────────────────────────────────────────────────────
// (init handled by Supabase session check above)
